<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width= , initial-scale=1.0">
    <title>what is my ip?</title>
</head>
<body>
    <h3>Your IP Address is: <span id="ip-output"></span></h3>

    <script>
     // fetch('http://localhost:8080/api/ip')
      fetch('https://tariqmuh-rathi-webcom-git-webcom-project.2.rahtiapp.fi/api/ip')

    .then(response => response.json())
    .then(data => {
      document.getElementById('ip-output').textContent = data.ip;
    })
    .catch(error => {
      console.error('Error fetching IP address:', error);
      document.getElementById('ip-output').textContent = 'Error fetching IP';
    });
     </script>
</body>
</html>
